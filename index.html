<!doctype html>
<html lang="ko">
<head>

  <meta name="description" content="손해보험·재보험 중개와 리스크 관리 컨설팅. 국내외 22개국 재보험 네트워크에서 최적의 보장을 설계합니다."/>
  <link rel="icon" type="image/png" href="assets/gl-logo.png"/>
  <link rel="stylesheet" href="styles.css"/>

  <!-- Netlify Identity widget — handles /admin invite tokens -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Markdown renderer for board post bodies -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Redirect to /admin after a fresh Identity login -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="board.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
